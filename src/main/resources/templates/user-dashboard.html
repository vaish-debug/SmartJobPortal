<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
}

.welcome-card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:30px;

    color:white;

    margin-top:30px;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.dashboard-card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border-radius:20px;

    color:white;

    padding:25px;

    text-align:center;

    transition:0.3s;

    height:100%;
}

.dashboard-card:hover{

    transform:translateY(-8px);

    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.dashboard-card i{

    font-size:45px;

    color:#60a5fa;
}

.profile-img{

    width:120px;

    height:120px;

    border-radius:50%;

    border:4px solid #60a5fa;
}

.btn-custom{
    border-radius:12px;
}

</style>

</head>

<body>

<div class="container">

<div class="welcome-card text-center">

    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
         class="profile-img">

    <h2 class="mt-3">
        Welcome,
        <span th:text="${user.name}">
        </span>
        👋
    </h2>

    <p>
        Ready to find your dream job today?
    </p>

</div>

<div class="row mt-4">

<div class="col-md-3 mb-4">

<div class="dashboard-card">

<i class="bi bi-person-circle"></i>

<h4 class="mt-3">My Profile</h4>

<p>View and update profile</p>

<a href="/profile"
   class="btn btn-primary btn-custom">
    Open
</a>

</div>

</div>

<div class="col-md-3 mb-4">

<div class="dashboard-card">

<i class="bi bi-briefcase-fill"></i>

<h4 class="mt-3">Jobs</h4>

<p>Browse available jobs</p>

<a href="/viewjobs"
   class="btn btn-success btn-custom">
    Open
</a>

</div>

</div>

<div class="col-md-3 mb-4">

<div class="dashboard-card">

<i class="bi bi-file-earmark-check-fill"></i>

<h4 class="mt-3">Applications</h4>

<p>Track your applications</p>

<a href="/viewapplications"
   class="btn btn-warning btn-custom">
    Open
</a>

</div>

</div>

<div class="col-md-3 mb-4">

<div class="dashboard-card">

<i class="bi bi-stars"></i>

<h4 class="mt-3">Recommendations</h4>

<p>AI Recommended Jobs</p>

<a href="/recommendations"
   class="btn btn-info btn-custom">
    Open
</a>

</div>

</div>

</div>

<div class="row">

<div class="col-md-4">

<div class="dashboard-card">

<h4>📄 Profile Completion</h4>

<div class="progress mt-3">

<div class="progress-bar bg-success"
     style="width:80%">
    80%
</div>

</div>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h4>🎯 Skills</h4>

<p th:text="${user.skills}">
Java, Spring Boot
</p>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h4>🏆 Qualification</h4>

<p th:text="${user.qualification}">
B.Tech
</p>

</div>

</div>

</div>

</div>

</body>

</html>
