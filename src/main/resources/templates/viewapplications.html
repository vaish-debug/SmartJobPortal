<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>My Applications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
<style>
body{
    background:#f8fafc;
}
h2{
    font-weight:bold;
}
</style>
</head>
<body>
<div class="container mt-5">
<h2>My Applications</h2>
<div class="row mb-4">
<div class="col-md-4">
<div class="card bg-warning text-white">
<div class="card-body">
<h5>Applied</h5>
<h3>Pending</h3>
</div>
</div>
</div>
<div class="col-md-4">
<div class="card bg-success text-white">
<div class="card-body">
<h5>Approved</h5>
<h3>Selected</h3>
</div>
</div>
</div>
<div class="col-md-4">
<div class="card bg-danger text-white">
<div class="card-body">
<h5>Rejected</h5>
<h3>Declined</h3>
</div>
</div>
</div>
</div>
<table class="table table-bordered">
<thead>
<tr>
    <th>ID</th>
    <th>Job ID</th>
    <th>Resume</th>
    <th>Status</th>
</tr>
</thead>
<tbody>
<tr th:each="app : ${applications}">
    <td th:text="${app.id}"></td>
    <td th:text="${app.jobId}"></td>
    <td th:text="${app.resumeFileName}"></td>
    <td>
        <span th:if="${app.status=='Applied'}"
              class="badge bg-warning">
            Applied
        </span>
        <span th:if="${app.status=='Approved'}"
              class="badge bg-success">
            Approved
        </span>
        <span th:if="${app.status=='Rejected'}"
              class="badge bg-danger">
            Rejected
        </span>
    </td>
</tr>
</tbody>
</table>
</div>
</body>
</html>
