<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>User Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    padding:30px;
}
.profile-card{
    max-width:950px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.4s;
}
.profile-card:hover{
    transform:translateY(-5px);
}
.profile-image{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #60a5fa;
    box-shadow:0 0 20px rgba(96,165,250,0.5);
}
.label{
    font-weight:bold;
    color:#93c5fd;
}
.info-box{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:12px;
    margin-bottom:15px;
}
.stat-card{
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    padding:20px;
    text-align:center;
    transition:0.3s;
}
.stat-card:hover{
    transform:scale(1.05);
}
hr{
    border-color:#64748b;
}
.info-box:hover{
    background:rgba(255,255,255,0.12);
    transform:translateY(-3px);
    transition:0.3s;
}
.profile-image:hover{
    transform:scale(1.05);
    transition:0.3s;
}
.btn{
    border-radius:12px;
    font-weight:600;
}
.stat-card h4{
    color:#93c5fd;
}
.stat-card p{
    color:#f1f5f9;
}
.profile-card h2{
    font-weight:bold;
}
.badge{
    padding:10px 18px;
}
</style>
</head>
<body>
<div class="profile-card">
<div class="text-center">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
         class="profile-image">
    <h2 class="mt-3"
        th:text="${user.name}">
        User Name
    </h2>
    <p class="text-light"
       th:text="${user.email}">
    </p>
    <span class="badge bg-success fs-6"
          th:text="${user.role}">
        USER
    </span>
</div>
<hr>
<div class="row">
    <div class="col-md-6">
        <div class="info-box">
            <span class="label">📱 Phone:</span>
            <span th:text="${user.phone}"></span>
        </div>
    </div>
    <div class="col-md-6">
        <div class="info-box">
            <span class="label">👤 Gender:</span>
            <span th:text="${user.gender}"></span>
        </div>
    </div>
    <div class="col-md-6">
        <div class="info-box">
            <span class="label">🎂 Date Of Birth:</span>
            <span th:text="${user.dob}"></span>
        </div>
    </div>
    <div class="col-md-6">
        <div class="info-box">
            <span class="label">🎓 Qualification:</span>
            <span th:text="${user.qualification}"></span>
        </div>
    </div>
    <div class="col-md-6">
        <div class="info-box">
            <span class="label">🏫 College:</span>
            <span th:text="${user.college}"></span>
        </div>
    </div>
    <div class="col-md-6">
        <div class="info-box">
            <span class="label">💼 Experience:</span>
            <span th:text="${user.experience}"></span>
        </div>
    </div>
    <div class="col-md-12">
        <div class="info-box">
            <span class="label">💻 Skills:</span>
            <span th:text="${user.skills}"></span>
        </div>
    </div>
    <div class="col-md-12">
        <div class="info-box">
            <span class="label">🏠 Address:</span>
            <span th:text="${user.address}"></span>
        </div>
    </div>
    <div class="col-md-4">
        <div class="info-box">
            <span class="label">🏙 City:</span>
            <span th:text="${user.city}"></span>
        </div>
    </div>
    <div class="col-md-4">
        <div class="info-box">
            <span class="label">📍 State:</span>
            <span th:text="${user.state}"></span>
        </div>
    </div>
    <div class="col-md-4">
        <div class="info-box">
            <span class="label">🌍 Country:</span>
            <span th:text="${user.country}"></span>
        </div>
    </div>
</div>
<hr>
<h3 class="text-center mb-4">
    📊 Professional Summary
</h3>
<div class="row">
    <div class="col-md-4">
        <div class="stat-card">
            <h4>💻 Skills</h4>
            <p th:text="${user.skills}">
            </p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card">
            <h4>🎓 Education</h4>
            <p th:text="${user.qualification}">
            </p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card">
            <h4>💼 Experience</h4>
            <p th:text="${user.experience}">
            </p>
        </div>
    </div>
</div>
<div class="text-center mt-4">
    <a href="/editProfile"
       class="btn btn-warning me-2">
        ✏ Edit Profile
    </a>
    <a href="/dashboard"
       class="btn btn-primary">
        ⬅ Back To Dashboard
    </a>
</div>
</div>
</body>
</html>
