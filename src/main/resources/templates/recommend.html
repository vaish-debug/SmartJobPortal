<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Job Recommendations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    padding:30px;
}

.page-title{
    text-align:center;
    color:white;
    font-weight:bold;
    margin-bottom:40px;
}

.skill-table{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border-radius:20px;

    overflow:hidden;

    color:white;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.skill-table th{
    background:#2563eb;
    color:white;
}

.skill-table td{
    background:rgba(255,255,255,0.05);
    color:white;
}

.recommend-card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:none;

    border-radius:20px;

    color:white;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    transition:0.3s;
}

.recommend-card:hover{

    transform:translateY(-8px);

    box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.progress{
    height:25px;
    border-radius:20px;
}

.progress-bar{
    font-weight:bold;
}

.match-badge{

    float:right;

    font-size:14px;
}

.card-title{
    color:#93c5fd;
    font-weight:bold;
}

.section-title{
    color:white;
    margin-bottom:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<div class="container">

<h1 class="page-title">
    🎯 AI Job Recommendations
</h1>

<h3 class="section-title">
    📊 Skill Demand Analysis
</h3>

<div class="table-responsive">

<table class="table skill-table">

<thead>

<tr>
    <th>Skill</th>
    <th>Demand Score</th>
</tr>

</thead>

<tbody>

<tr th:each="entry : ${recommendations}">

    <td th:text="${entry.key}"></td>

    <td>
        <span class="badge bg-success"
              th:text="${entry.value}">
        </span>
    </td>

</tr>

</tbody>

</table>

</div>

<h3 class="section-title">
    🚀 Recommended Jobs
</h3>

<div class="row">

<div class="col-md-4 mb-4"
     th:each="rec : ${recommendations}">

<div class="card recommend-card">

<div class="card-body">

<span class="badge bg-success match-badge">
Match
</span>

<h4 class="card-title"
    th:text="${rec.key.title}">
</h4>

<hr>

<p>
    <i class="bi bi-building"></i>
    <strong> Company:</strong>
    <span th:text="${rec.key.company}">
    </span>
</p>

<p>
    <i class="bi bi-tools"></i>
    <strong> Skills:</strong>
    <span th:text="${rec.key.skills}">
    </span>
</p>

<p>
    <i class="bi bi-graph-up-arrow"></i>
    <strong> Match Score</strong>
</p>

<div class="progress">

<div class="progress-bar bg-success"

th:style="'width:' + ${rec.value} + '%'">

<span th:text="${rec.value} + '%'">
</span>

</div>

</div>

<a th:href="@{/apply(jobId=${rec.key.id})}"
   class="btn btn-primary w-100 mt-3">

    Apply Now

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
