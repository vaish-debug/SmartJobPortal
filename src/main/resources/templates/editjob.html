<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-warning">
            <h3>Edit Job</h3>
        </div>
        <div class="card-body">
            <form action="/updateJob"
                  method="post"
                  th:object="${job}">
                <input type="hidden"
                       th:field="*{id}">
                <div class="mb-3">
                    <label>Title</label>
                    <input type="text"
                           th:field="*{title}"
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label>Company</label>
                    <input type="text"
                           th:field="*{company}"
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label>Location</label>
                    <input type="text"
                           th:field="*{location}"
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label>Salary</label>
                    <input type="number"
                           th:field="*{salary}"
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label>Skills</label>
                    <input type="text"
                           th:field="*{skills}"
                           class="form-control">
                </div>
                <button class="btn btn-success">
                    Update Job
                </button>
                <div class="mb-3">
<label>Company Logo URL</label>
<input type="text"
       th:field="*{logo}"
       class="form-control">
</div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
