<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Apply Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<div class="card">

<div class="card-header bg-primary text-white">
<h3>Apply For Job</h3>
</div>

<div class="card-body">

<form action="/saveApplication"
      method="post"
      enctype="multipart/form-data">
<div class="mb-3">

<label>User ID</label>

<input type="number"
       name="userId"
       class="form-control"
       required>

</div>

<div class="mb-3">

<label>Job ID</label>

<input type="number"
       name="jobId"
       th:value="${jobId}"
       class="form-control"
       readonly>

</div>

<div class="mb-3">
    <label>Resume (PDF)</label>

    <input type="file"
           name="resume"
           class="form-control"
           accept=".pdf">
</div>
<button class="btn btn-success">
Apply
</button>

</form>

</div>

</div>

</div>

</body>
</html>
