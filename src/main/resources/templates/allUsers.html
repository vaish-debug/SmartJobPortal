<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Registered Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    padding:30px;
}

.page-title{
    color:white;
    text-align:center;
    font-weight:bold;
    margin-bottom:30px;
}

.user-card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:30px;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.table{
    color:white;
}

.table thead{
    background:#2563eb;
}

.table thead th{
    color:white;
    border:none;
    text-align:center;
}

.table tbody tr{

    background:rgba(255,255,255,0.05);

    transition:0.3s;
}

.table tbody tr:hover{

    background:rgba(255,255,255,0.12);

    transform:scale(1.01);
}

.table td{
    vertical-align:middle;
    text-align:center;
    border-color:rgba(255,255,255,0.1);
}

.role-admin{
    background:#dc2626;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
}

.role-user{
    background:#16a34a;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
}

.skill-badge{
    background:#0ea5e9;
    color:white;
    padding:5px 10px;
    border-radius:15px;
    font-size:13px;
}

.stats-box{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border-radius:20px;

    padding:20px;

    color:white;

    text-align:center;

    margin-bottom:25px;
}

.search-box{
    margin-bottom:20px;
}

.form-control{
    border-radius:12px;
}

</style>

</head>

<body>

<div class="container">

<h1 class="page-title">
    👥 Registered Users Management
</h1>

<div class="stats-box">

    <h4>
        Total Users:
        <span th:text="${#lists.size(users)}"></span>
    </h4>

</div>

<div class="user-card">

<div class="search-box">

<input type="text"
       class="form-control"
       placeholder="Search Users...">

</div>

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Role</th>
    <th>Phone</th>
    <th>Qualification</th>
    <th>Skills</th>
</tr>

</thead>

<tbody>

<tr th:each="user : ${users}">

    <td th:text="${user.id}"></td>

    <td>
        <i class="bi bi-person-circle"></i>
        <span th:text="${user.name}"></span>
    </td>

    <td th:text="${user.email}"></td>

    <td>

        <span th:if="${user.role=='ADMIN'}"
              class="role-admin">
            ADMIN
        </span>

        <span th:if="${user.role=='USER'}"
              class="role-user">
            USER
        </span>

    </td>

    <td th:text="${user.phone}"></td>

    <td th:text="${user.qualification}"></td>

    <td>

        <span class="skill-badge"
              th:text="${user.skills}">
        </span>

    </td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
