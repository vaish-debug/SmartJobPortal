<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Jobs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
<style>
body{

    background:#f8fafc;

}
.job-card{
    border:none;
    border-radius:20px;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);

}
.job-card:hover{
    transform:translateY(-8px);

}
.salary{
    color:#16a34a;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="container mt-5">
<h2>Available Jobs</h2>
<form action="/search" method="get">
<div class="row mb-3">
<div class="col-md-8">
<input type="text"
    name="keyword"
    class="form-control"
    placeholder="Search by Skill">
</div>
<div class="col-md-4">
<button class="btn btn-primary">
Search
</button>
<a href="/sortSalary"
class="btn btn-success">
Sort By Salary </a>
</div>
</div>
</form>
<table class="table table-bordered table-hover">
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Company</th>
<th>Location</th>
<th>Salary</th>
<th>Skills</th>
<th>Category</th>
<th>Apply</th>
<th>Edit</th>
<th>Delete</th>
<th>Save</th>
</tr>
</thead>
<tbody>
<tr th:each="job : ${jobs}">
<td th:text="${job.id}"></td>
<td th:text="${job.title}"></td>
<td th:text="${job.company}"></td>
<td th:text="${job.location}"></td>
<td th:text="${job.salary}"></td>
<td th:text="${job.skills}"></td>
<td th:text="${job.category}"></td>
<td>
<a th:href="@{/apply(jobId=${job.id})}"
   class="btn btn-primary btn-sm">
Apply
</a>
</td>
<td>
<a th:href="@{/editJob/{id}(id=${job.id})}"
   class="btn btn-warning btn-sm">
Edit
</a>
</td>
<td>
<a th:href="@{/deleteJob/{id}(id=${job.id})}"
   class="btn btn-danger btn-sm">
Delete
</a>
</td>
<td>
<a th:href="@{/saveJob/{id}(id=${job.id})}"
   class="btn btn-info btn-sm">
Save
</a>
</td>
</tr>
</tbody>
</table>
</div>
</body>
</html>
