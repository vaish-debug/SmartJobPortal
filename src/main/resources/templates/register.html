<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
<style>
body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    padding:40px;
}
.register-card{
    max-width:1000px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.form-control,
.form-select{
    border-radius:12px;
}
h2{
    text-align:center;
    margin-bottom:30px;
}
</style>
</head>
<body>
<div class="register-card">
<h2>🚀 Smart Job Portal Registration</h2>
<div th:if="${error}"
     class="alert alert-danger">
    <span th:text="${error}"></span>
</div>
<div th:if="${success}"
     class="alert alert-success">
    <span th:text="${success}"></span>
</div>
<form th:action="@{/saveUser}"
      th:object="${user}"
      method="post">
<div class="row">
<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text"
       th:field="*{name}"
       class="form-control mb-2"
       placeholder="Full Name">
<div class="text-danger"
     th:errors="*{name}">
</div>
</div>
<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email"
       th:field="*{email}"
       class="form-control mb-2"
       placeholder="Email">
<div class="text-danger"
     th:errors="*{email}">
</div>
</div>
<div class="col-md-6 mb-3">
<label>Password</label>
<input type="password"
       th:field="*{password}"
       minlength="6"
       class="form-control mb-2"
       placeholder="Password"
       required>
<small class="text-warning">
Password must contain:
Uppercase, Lowercase,
Number, Special Character
and minimum 6 characters.
</small>
<div class="text-danger"
     th:errors="*{password}">
</div>
</div>
<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input type="tel"
       th:field="*{phone}"
       pattern="[0-9]{10}"
       class="form-control mb-2"
       required>
<div class="text-danger"
     th:errors="*{phone}">
</div>
</div>
<div class="col-md-6 mb-3">
<label>Gender</label>
<select th:field="*{gender}"
class="form-select">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>
<div class="col-md-6 mb-3">
<label>Date Of Birth</label>
<input type="date" th:field="*{dob}"
class="form-control">
</div>
<div class="col-md-12 mb-3">
<label>Address</label>
<input type="text" th:field="*{address}"
class="form-control">
</div>
<div class="col-md-4 mb-3">
<label>City</label>
<input type="text" th:field="*{city}"
class="form-control">
</div>
<div class="col-md-4 mb-3">
<label>State</label>
<input type="text" th:field="*{state}"
class="form-control">
</div>
<div class="col-md-4 mb-3">
<label>Country</label>
    <select name="country" class="form-select" required>
    <option value="">Select Country</option>
    <option value="India">India</option>
    <option value="United States">United States</option>
    <option value="United Kingdom">United Kingdom</option>
    <option value="Australia">Australia</option>
    <option value="Canada">Canada</option>
    <option value="Germany">Germany</option>
    <option value="France">France</option>
    <option value="Japan">Japan</option>
    <option value="China">China</option>
    <option value="Brazil">Brazil</option>
    <!-- Add remaining countries -->
</select>
</div>
<div class="col-md-6 mb-3">
<label>Qualification</label>
<input type="text" th:field="*{qualification}"
class="form-control">
</div>
<div class="col-md-6 mb-3">
<label>College</label>
<input type="text" th:field="*{college}"
class="form-control">
</div>
<div class="col-md-6 mb-3">
<label>Skills</label>
<input type="text" th:field="*{skills}"
class="form-control"
placeholder="Java, Spring Boot, MySQL">
</div>
<div class="col-md-6 mb-3">
<label>Experience</label>
<input type="text" th:field="*{experience}"
class="form-control"
placeholder="Fresher / 2 Years">
</div>
</div>
<div class="alert alert-success"
     th:if="${success}"
     th:text="${success}">
</div>
<button class="btn btn-success w-100 mt-3">
Register
</button>
</form>
</div>
</body>
</html>
