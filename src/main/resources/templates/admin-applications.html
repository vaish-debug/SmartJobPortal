<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin - Manage Applications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f8fafc;
        }

        .container{
            margin-top:40px;
        }

        h2{
            font-weight:bold;
            margin-bottom:20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Manage Job Applications</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User ID</th>
            <th>Job ID</th>
            <th>Resume</th>
            <th>Status</th>
            <th>Download Resume</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="app : ${applications}">

            <td th:text="${app.id}"></td>
            <td th:text="${app.userId}"></td>
            <td th:text="${app.jobId}"></td>
            <td th:text="${app.resumeFileName}"></td>

            <td>
                <span th:if="${app.status=='Applied'}"
                      class="badge bg-warning">
                    Applied
                </span>

                <span th:if="${app.status=='Approved'}"
                      class="badge bg-success">
                    Approved
                </span>

                <span th:if="${app.status=='Rejected'}"
                      class="badge bg-danger">
                    Rejected
                </span>
            </td>

            <td>
                <a th:href="@{/downloadResume/{fileName}(fileName=${app.resumeFileName})}"
                   class="btn btn-primary btn-sm">
                    Download
                </a>
            </td>

            <td>
                <a th:href="@{/approve/{id}(id=${app.id})}"
                   class="btn btn-success btn-sm">
                    Approve
                </a>

                <a th:href="@{/reject/{id}(id=${app.id})}"
                   class="btn btn-danger btn-sm">
                    Reject
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
