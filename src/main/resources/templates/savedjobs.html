<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Saved Jobs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f1f5f9;
}

.job-card{

    border:none;

    border-radius:20px;

    transition:0.3s;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.1);
}

.job-card:hover{
    transform:translateY(-8px);
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">
❤️ Saved Jobs
</h2>

<div class="row">

<div class="col-md-4 mb-4"
     th:each="job : ${savedJobs}">

<div class="card job-card">

<div class="card-body">

<h4>
Saved Job
</h4>

<p>
<b>User ID:</b>
<span th:text="${job.userId}"></span>
</p>

<p>
<b>Job ID:</b>
<span th:text="${job.jobId}"></span>
</p>

<a href="/viewjobs"
class="btn btn-primary">
View Jobs </a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
