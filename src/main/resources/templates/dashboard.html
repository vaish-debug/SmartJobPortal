<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<head>
    <title>Smart Job Portal Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            min-height:100vh;
            color:white;
        }

        .navbar{
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        .dashboard-title{
            font-size:40px;
            font-weight:bold;
            text-align:center;
            margin-top:30px;
            margin-bottom:30px;
        }

        .card-box{
            border-radius:20px;
            color:white;
            padding:20px;
            transition:0.4s;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .card-box:hover{
            transform:translateY(-10px) scale(1.03);
        }

        .users{
            background:linear-gradient(135deg,#3b82f6,#2563eb);
        }

        .jobs{
            background:linear-gradient(135deg,#22c55e,#16a34a);
        }

        .applications{
            background:linear-gradient(135deg,#f59e0b,#d97706);
        }

        .card-icon{
            font-size:45px;
        }

        .card-number{
            font-size:38px;
            font-weight:bold;
        }

        .action-btn{
            border-radius:15px;
            padding:15px;
            width:100%;
            margin-bottom:15px;
            font-weight:bold;
            transition:0.3s;
        }

        .action-btn:hover{
            transform:scale(1.05);
        }

        .glass-panel{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            border-radius:20px;
            padding:25px;
            margin-top:40px;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        footer{
            text-align:center;
            margin-top:50px;
            padding:20px;
            color:#cbd5e1;
        }

    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand text-white fw-bold fs-3">
            🚀 Smart Job Portal
        </span>
    </div>
</nav>

<div class="container">

    <div class="dashboard-title">
        Welcome to Admin Dashboard
    </div>

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="card-box users">

                <div class="d-flex justify-content-between">

                    <div>
                        <h4>Users</h4>
                        <div class="card-number"
                             th:text="${totalUsers}">
                            0
                        </div>
                    </div>

                    <i class="bi bi-people-fill card-icon"></i>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card-box jobs">

                <div class="d-flex justify-content-between">

                    <div>
                        <h4>Jobs</h4>
                        <div class="card-number"
                             th:text="${totalJobs}">
                            0
                        </div>
                    </div>

                    <i class="bi bi-briefcase-fill card-icon"></i>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card-box applications">

                <div class="d-flex justify-content-between">

                    <div>
                        <h4>Applications</h4>
                        <div class="card-number"
                             th:text="${totalApplications}">
                            0
                        </div>
                    </div>

                    <i class="bi bi-file-earmark-text-fill card-icon"></i>

                </div>

            </div>

        </div>

    </div>

    <div class="glass-panel">

        <h3 class="mb-4">
            ⚡ Quick Actions
        </h3>
        <div class="glass-panel">

    <h3 class="mb-4">
        📊 Portal Analytics
    </h3>

    <canvas id="jobChart"></canvas>

</div>
        <div class="row">

            <div class="col-md-4">
                <a href="/addjob"
                   class="btn btn-primary action-btn">
                    ➕ Add Job
                </a>
            </div>

            <div class="col-md-4">
                <a href="/viewjobs"
                   class="btn btn-success action-btn">
                    💼 View Jobs
                </a>
            </div>

            <div class="col-md-4">
                <a href="/admin-applications"
                   class="btn btn-warning action-btn">
                    📄 Applications
                </a>
            </div>

            <div class="col-md-4">
                <a href="/recommend"
                   class="btn btn-info action-btn">
                    ⭐ Recommendations
                </a>
            </div>

            <div class="col-md-4">
                <a href="/allUsers"
                   class="btn btn-secondary action-btn">
                    👤 User Profiles
                </a>
            </div>

            <div class="col-md-4">
                <a href="/savedJobs"
                   class="btn btn-danger action-btn">
                    ❤️ Saved Jobs
                </a>
            </div>
            <a href="/logout"
   class="btn btn-danger">
   Logout
</a>

        </div>

    </div>

</div>

<footer>
    © 2026 Smart Job Portal | Internship Project
</footer>
<script th:inline="javascript">

const ctx =
document.getElementById('jobChart');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: [
            'Users',
            'Jobs',
            'Applications'
        ],

        datasets: [{

            label: 'Portal Statistics',

            data: [

               /* [[${totalUsers}]]*/,

                /*[[${totalJobs}]]*/,

                /*[[${totalApplications}]]*/

            ]

        }]
    }

});

</script>
</body>
</html>
